name: Haskell CI

on:
  push:
    branches: ["master", "main"]
    tags:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        ghc: ['9.6.7', '9.8.4', '9.10.3', '9.12.2']
      fail-fast: false

    name: Build with GHC ${{ matrix.ghc }} on ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Cache
      uses: actions/cache@v5
      with:
        path: ~/.cabal
        key: ${{ runner.os }}-${{ matrix.ghc }}-${{ hashFiles('**/*.cabal') }}-${{ hashFiles('**/cabal.project') }}
        restore-keys: ${{ runner.os }}-${{ matrix.ghc }}-

    - name: Haskell setup
      uses: haskell-actions/setup@main
      with:
        ghc-version: ${{ matrix.ghc }}

    - name: Configure
      run: |
        cabal update
        cabal configure --enable-tests --enable-benchmarks

    - name: Build dependencies
      run: cabal build all --only-dependencies

    - name: Build
      run: cabal build all

    - name: Run tests
      run: cabal test all

    - name: Lint changelogs
      run: |
        cabal run -- cleret changelogs format -i $(git ls-files '*CHANGELOG.md')
        git diff --exit-code

    - name: Install nix
      if: matrix.ghc == '9.10.3'
      uses: cachix/install-nix-action@v31

    - name: Check nix hashes
      if: matrix.ghc == '9.10.3'
      run: cabal run -- cleret nix hashes -v
