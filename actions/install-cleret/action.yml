name: Install cleret
runs:
  using: composite
  steps:
  - shell: bash
    env:
      REPO: ${{ github.action_repository }}
      RELEASE: ${{ github.action_ref }}
      GH_TOKEN: ${{ github.token }}
    run: |
      BINDIR=$HOME/.local/bin
      mkdir -p "$BINDIR"
      grep -q "$BINDIR" "$GITHUB_PATH" || echo "$BINDIR" >>"$GITHUB_PATH"

      # TODO: change this to be cross-platform, or remove it.
      # Although `gh` should always be present on one of GitHub's runners,
      # it typically isn't when testing a workflow locally with `act`.
      type gh || { sudo apt-get update && sudo apt-get install -y gh; }

      if gh release view -R "$REPO" "$RELEASE" --json '' >/dev/null
      then
        echo "Downloading asset from release $RELEASE"
        PLATFORM=$(uname -s)-$(uname -m)
        gh release download -O - -R "$REPO" "$RELEASE" -p "*-$PLATFORM-*.tgz" |
          tar -xz --strip-components=1 --wildcards -C "$BINDIR" '*/cleret'
      else
        echo "Downloading artifact from commit $RELEASE"
        RUNID=$(gh run list -R "$REPO" -c "$RELEASE" -w 'Nix Build' --json 'databaseId' -q '.[0].databaseId')
        if [[ -z "$RUNID" ]]
        then
          echo >&2 "No run found for commit $RELEASE"
          exit 1
        fi
        DOWNLOAD=$(mktemp -d)
        trap 'rm -rf "$DOWNLOAD"' EXIT
        gh run download -R "$REPO" "$RUNID" -D "$DOWNLOAD"
        install "$DOWNLOAD"/*/cleret "$BINDIR"
      fi
